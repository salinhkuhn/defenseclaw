# DefenseClaw Strict Policy
# Maximum security — blocks MEDIUM and above, no allow-list bypass
name: strict
description: Maximum security policy for high-risk environments

admission:
  scan_on_install: true
  allow_list_bypass_scan: false

skill_actions:
  critical:
    file: quarantine
    runtime: disable
    install: block
  high:
    file: quarantine
    runtime: disable
    install: block
  medium:
    file: quarantine
    runtime: disable
    install: block
  low:
    file: none
    runtime: enable
    install: none
  info:
    file: none
    runtime: enable
    install: none

scanner_overrides:
  mcp:
    medium:
      file: quarantine
      runtime: disable
      install: block
    low:
      file: none
      runtime: disable
      install: none
  plugin:
    high:
      file: quarantine
      runtime: disable
      install: block
    medium:
      file: quarantine
      runtime: disable
      install: block

guardrail:
  block_threshold: 2
  alert_threshold: 1
  cisco_trust_level: full
  patterns:
    injection:
      - "ignore previous"
      - "ignore all instructions"
      - "ignore above"
      - "disregard previous"
      - "disregard all"
      - "you are now"
      - "act as"
      - "pretend you are"
      - "bypass"
      - "jailbreak"
      - "do anything now"
      - "dan mode"
    secrets:
      - "sk-"
      - "sk-ant-"
      - "sk-proj-"
      - "api_key="
      - "apikey="
      - "-----begin rsa"
      - "-----begin private"
      - "-----begin openssh"
      - "aws_access_key"
      - "aws_secret_access"
      - "password="
      - "token:"
      - "bearer "
      - "ghp_"
      - "gho_"
      - "github_pat_"
    exfiltration:
      - "/etc/passwd"
      - "/etc/shadow"
      - "base64 -d"
      - "base64 --decode"
      - "exfiltrate"
      - "send to my server"
      - "curl http"
  severity_mappings:
    injection: HIGH
    secrets: MEDIUM
    exfiltration: HIGH

firewall:
  default_action: deny
  blocked_destinations:
    - "169.254.169.254"
    - "fd00:ec2::254"
  allowed_domains:
    - "api.github.com"
    - "github.com"
    - "proxy.golang.org"
    - "sum.golang.org"
    - "registry.npmjs.org"
    - "pypi.org"
    - "files.pythonhosted.org"
  allowed_ports:
    - 443

enforcement:
  update_sandbox_policy: true
  max_enforcement_delay_seconds: 1

audit:
  log_all_actions: true
  log_scan_results: true
  retention_days: 365
